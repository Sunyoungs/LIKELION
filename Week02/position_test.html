<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Position 속성 실습</title>
  <link rel="stylesheet" href="position_style.css">
</head>
<body>
  <div class="fixed-box box">fixed</div>

  <div class="container">
    <div class="static-box box">static</div>
    <div class="relative-box box">relative</div>
    <div class="absolute-box box">absolute</div>
  </div>

  <p style="height: 1000px; padding: 20px;">
    스크롤을 내려서 <code>fixed</code> 박스의 고정 위치를 확인해보세요!
  </p>
</body>
</html>
