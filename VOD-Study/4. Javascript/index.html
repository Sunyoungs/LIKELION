<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>OTT 시청 기록 정리기</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="script.js"></script>
</head>
<body>
  <h1>📺 OTT 시청 기록 분석 대시보드</h1>

  <section id="data-section">
    <h2>📋 시청 기록 데이터</h2>
    <div id="data-output" class="data-output"></div>
  </section>

  <section id="total-time-section">
    <h2>⏱️ 총 시청 시간</h2>
    <div id="total-time-output" class="data-output"></div>
  </section>

  <section id="genre-ranking-section">
    <h2>🏆 장르별 시청 횟수</h2>
    <div id="genre-ranking-output" class="data-output"></div>
  </section>

  <section id="day-average-section">
    <h2>📅 요일별 평균 시청 시간</h2>
    <div id="day-average-output" class="data-output"></div>
  </section>

</body>
</html>
